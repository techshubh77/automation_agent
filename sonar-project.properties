# =====================================================================
# SonarQube Project Configuration
# =====================================================================

# Must be unique in a given SonarQube instance
sonar.projectKey=automation-agent

# This is the name and version displayed in the SonarQube UI.
sonar.projectName=Automation-Agent
sonar.projectVersion=0.1.0

# Path to the source directories (comma-separated).
# Points to the main application code.
sonar.sources=app

# Encoding of the source files
sonar.sourceEncoding=UTF-8

# =====================================================================
# Exclusions & Inclusions
# =====================================================================

# Exclude patterns for files and directories that shouldn't be analyzed:
# - Virtual environments (.venv, venv)
# - Python cache files (__pycache__, *.pyc)
# - Database migrations (app/migrations)
# - AI model files and local vector/embedding storage
# - Uploads and generated storage directories
# - Log files
# - Development/IDE configurations (.vscode, .idea, .cursor)
sonar.exclusions=\
  **/.venv/**,\
  **/venv/**,\
  **/__pycache__/**,\
  **/*.py[cod],\
  **/app/migrations/**,\
  **/storage/**,\
  **/uploads/**,\
  **/*.log,\
  **/.vscode/**,\
  **/.idea/**,\
  **/.cursor/**

# =====================================================================
# Python Language Configurations
# =====================================================================

# The Python version matching the project requirements
sonar.python.version=3.13

# =====================================================================
# Test and Coverage Configurations (Optional)
# =====================================================================

# Path to the test directories (comma-separated).
# sonar.tests=tests

# Test execution reports and coverage XML report paths
# (generated by pytest-cov — run: uv run pytest --cov=app --cov-report=xml)
# sonar.python.xunit.reportPath=reports/junit-results.xml
# sonar.python.coverage.reportPaths=coverage.xml
